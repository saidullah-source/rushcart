<!DOCTYPE html>
<html>
<body>

<h2>Rush Cart</h2>

<a href="login.html">Login</a> | 
<a href="cart.html">Cart 🛒</a>

<hr>

<div id="products"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyApfAZv8aBr9kekqNh6DUwsBY4pfAn7zGg",
authDomain:"rush-cart.firebaseapp.com",
projectId:"rush-cart"
});

const db = firebase.firestore();

function load(){

let html="";

db.collection("products").get().then(snap=>{
snap.forEach(doc=>{
let p=doc.data();

html+=`
<div style="border:1px solid #ccc;padding:10px;margin:10px;">
<img src="${p.img}" width="100"><br>
<b>${p.name}</b><br>
₹${p.price} <strike>₹${p.cut}</strike><br>
<p>${p.desc}</p>

<button onclick="addCart('${p.name}',${p.price})">Add to Cart</button>
<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
</div>
`;
});

products.innerHTML=html;

});

}

function addCart(name,price){
let c=JSON.parse(localStorage.getItem("cart"))||[];
c.push({name,price});
localStorage.setItem("cart",JSON.stringify(c));
alert("Added");
}

function buyNow(name,price){
localStorage.setItem("buyNow",JSON.stringify([{name,price}]));
location="checkout.html";
}

load();

</script>

</body>
</html>
