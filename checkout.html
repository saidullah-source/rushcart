<!DOCTYPE html>
<html>
<body>

<h2>Checkout</h2>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="email" placeholder="Email"><br>
<input id="pin" placeholder="Pincode"><br>
<input id="state" placeholder="State"><br>
<input id="district" placeholder="District"><br>
<textarea id="address" placeholder="Full Address"></textarea><br>

<button onclick="place()">Place Order</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyApfAZv8aBr9kekqNh6DUwsBY4pfAn7zGg",
authDomain:"rush-cart.firebaseapp.com",
projectId:"rush-cart"
});

const db = firebase.firestore();

function place(){

let items=JSON.parse(localStorage.getItem("buyNow"));

db.collection("orders").add({
name:name.value,
phone:phone.value,
email:email.value,
pincode:pin.value,
state:state.value,
district:district.value,
address:address.value,
items:items,
status:"pending"
});

alert("Order Placed");
localStorage.removeItem("cart");

}

</script>

</body>
</html>
