<!DOCTYPE html>
<html>
<body>

<h2>Delivery Details</h2>

<input id="name" placeholder="Full Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="email" placeholder="Email"><br>
<input id="pin" placeholder="Pincode"><br>
<input id="state" placeholder="State"><br>
<input id="district" placeholder="District"><br>
<input id="area" placeholder="Area / Village"><br>
<textarea id="address" placeholder="Full Address"></textarea><br>

<button onclick="place()">Place Order</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const db=getFirestore(initializeApp({
apiKey:"AIzaSyApfAZv8aBr9kekqNh6DUwsBY4pfAn7zGg",
authDomain:"rush-cart.firebaseapp.com",
projectId:"rush-cart"
}));

window.place=async()=>{
let items=JSON.parse(localStorage.getItem("buyNow"));

await addDoc(collection(db,"orders"),{
name:name.value,
phone:phone.value,
email:email.value,
pincode:pin.value,
state:state.value,
district:district.value,
area:area.value,
address:address.value,
items:items,
status:"pending"
});

msg.innerHTML="Order Placed ✅";
localStorage.removeItem("cart");
}

</script>

</body>
</html>
