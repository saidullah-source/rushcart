<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<input id="name" placeholder="Name"><br>
<input id="price" placeholder="Price"><br>
<input id="cut" placeholder="Cut Price"><br>
<input id="desc" placeholder="Description"><br>
<input id="img" placeholder="Image URL"><br>

<button onclick="add()">Add</button>

<hr>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyApfAZv8aBr9kekqNh6DUwsBY4pfAn7zGg",
authDomain:"rush-cart.firebaseapp.com",
projectId:"rush-cart"
});

const db = firebase.firestore();

function add(){
db.collection("products").add({
name:name.value,
price:Number(price.value),
cut:Number(cut.value),
desc:desc.value,
img:img.value
}).then(()=>load());
}

function load(){
let html="";
db.collection("products").get().then(snap=>{
snap.forEach(doc=>{
let p=doc.data();
html+=`
${p.name} ₹${p.price}
<button onclick="del('${doc.id}')">Delete</button><br>
`;
});
list.innerHTML=html;
});
}

function del(id){
db.collection("products").doc(id).delete().then(()=>load());
}

load();

</script>

</body>
</html>
