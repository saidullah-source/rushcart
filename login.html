<!DOCTYPE html>
<html>
<body>

<h2>Login / Register</h2>

<input id="email" placeholder="Email"><br><br>
<input id="pass" placeholder="Password" type="password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>

firebase.initializeApp({
apiKey:"AIzaSyApfAZv8aBr9kekqNh6DUwsBY4pfAn7zGg",
authDomain:"rush-cart.firebaseapp.com",
projectId:"rush-cart"
});

const auth = firebase.auth();

function register(){
auth.createUserWithEmailAndPassword(email.value, pass.value)
.then(()=>msg.innerText="Registered")
.catch(e=>msg.innerText=e.message);
}

function login(){
auth.signInWithEmailAndPassword(email.value, pass.value)
.then(res=>{
if(res.user.email=="vitalvault.official@gmail.com"){
location="admin.html";
}else{
location="index.html";
}
})
.catch(e=>msg.innerText=e.message);
}

</script>

</body>
</html>
